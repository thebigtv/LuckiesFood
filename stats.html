<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Luckies Statistics Dashboard</title><style>body{font-family:Arial,sans-serif;background:#1b1b1b;color:#fff;max-width:1200px;margin:auto;padding:20px}h1{text-align:center;color:#f0a500}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:30px}.card{background:#2a2a2a;padding:20px;border-radius:12px}.big{font-size:36px;font-weight:bold;color:#f0a500}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #444;text-align:left}th{color:#f0a500}</style></head><body><h1>📊 LUCKIES STATISTICS DASHBOARD</h1><div class='grid'><div class='card'><div class='big' id='activeOrders'>0</div><div>Active Orders</div></div><div class='card'><div class='big' id='newOrders'>0</div><div>New Orders</div></div><div class='card'><div class='big' id='readyOrders'>0</div><div>Ready Orders</div></div><div class='card'><div class='big' id='popularItem'>-</div><div>Most Popular Item</div></div></div><div class='grid'><div class='card'><h2>Pizza Sales</h2><table><tbody id='pizzaStats'></tbody></table></div><div class='card'><h2>Table Activity</h2><table><tbody id='tableStats'></tbody></table></div></div><div class='card'><h2>Live Order Feed</h2><table><thead><tr><th>Order</th><th>Table</th><th>Status</th></tr></thead><tbody id='orderFeed'></tbody></table></div><script>const API_URL='https://script.google.com/macros/s/AKfycbzOTMR-SbXk8SN4Bt4XilbKktpF-i2Wg1J3VEYzS2ccw8hTcRmIH9U5EThVXr83Ae6B0g/exec';async function loadStats(){try{const response=await fetch(API_URL);const orders=await response.json();document.getElementById('activeOrders').textContent=orders.length;document.getElementById('newOrders').textContent=orders.filter(o=>(o.status||'NEW')==='NEW').length;document.getElementById('readyOrders').textContent=orders.filter(o=>o.status==='READY').length;const p={Margherita:0,Pepperoni:0,'Just Meat':0,'Garlic Bread':0,'Garlic Bread + Cheese':0,Special:0};const t={};orders.forEach(o=>{p.Margherita+=Number(o.margherita||0);p.Pepperoni+=Number(o.pepperoni||0);p['Just Meat']+=Number(o.justMeat||0);p['Garlic Bread']+=Number(o.garlicBread||0);p['Garlic Bread + Cheese']+=Number(o.garlicBreadCheese||0);p.Special+=Number(o.special||0);t[o.table]=(t[o.table]||0)+1});let popular='-';let high=0;Object.entries(p).forEach(([n,v])=>{if(v>high){high=v;popular=n}});document.getElementById('popularItem').textContent=popular;document.getElementById('pizzaStats').innerHTML=Object.entries(p).map(([n,v])=>'<tr><td>'+n+'</td><td>'+v+'</td></tr>').join('');document.getElementById('tableStats').innerHTML=Object.entries(t).sort((a,b)=>b[1]-a[1]).map(([n,v])=>'<tr><td>Table '+n+'</td><td>'+v+'</td></tr>').join('');document.getElementById('orderFeed').innerHTML=orders.map(o=>'<tr><td>'+(o.orderId||'-')+'</td><td>'+o.table+'</td><td>'+(o.status||'NEW')+'</td></tr>').join('')}catch(e){console.error(e)}}loadStats();setInterval(loadStats,10000);</script></body></html>
