<!DOCTYPE html>
<html>
<body>

<button onclick="testOrder()">Create Test Order</button>

<script>
async function testOrder() {

  const response = await fetch(
    "https://script.google.com/macros/s/AKfycbyLZXkX2z9WBAAf9OsBJKHaxItiMgPOc3Qh9_clRFLE_-QN7wH-JhL1bQUarVhpqXLS_A/exec",
    {
      method: "POST",
      body: JSON.stringify({
        action: "create",
        table: "7",
        pepperoni: 2,
        garlicBreadCheese: 1,
        notes: "Test order"
      })
    }
  );

  const result = await response.json();

  alert(JSON.stringify(result));
}
</script>

</body>
</html>
